<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#131b30,#da1f1f);
      font-family:Arial, Helvetica, sans-serif;
      color:white;
    }

    .container{
      text-align:center;
    }

    h1{
      font-size:3rem;
      letter-spacing:4px;
      margin-bottom:15px;
    }

    p{
      color:#ffffff;
      margin-bottom:35px;
      letter-spacing:1px;
    }


    .loader{
      width:80px;
      height:80px;

      border:8px solid rgba(80, 61, 61, 0.15);

      border-top:8px solid #19adec;

      border-radius:50%;

      margin:auto;

      animation:spin 1s linear infinite;
    }

    @keyframes spin{

      from{
        transform:rotate(0deg);
      }

      to{
        transform:rotate(360deg);
      }

    }

  

    .progress{
      width:260px;
      height:10px;

      background:rgba(232, 240, 250, 0.966);

      border-radius:20px;

      overflow:hidden;

      margin:35px auto 15px;
    }

    .progress span{

      display:block;

      height:100%;

      width:40%;

      background:#00c8ecf8;

      animation:loading 2s infinite;
    }

    @keyframes loading{

      0%{
        width:0%;
      }

      50%{
        width:75%;
      }

      100%{
        width:100%;
      }

    }

    .small{
      color:#ebf4ff;
      font-size:.9rem;
    }

  </style>

</head>

<body>

  <div class="container">
    <h1>Loading ...</h1>

    <div class="loader"></div>
    <div class="progress">
    
        <span></span>
    </div>
    <div class="small">
      Building something awesome...
    </div>
  </div>

</body>
</html>
